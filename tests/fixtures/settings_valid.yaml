llm:
  provider: openai
  model: gpt-4o
  api_key: test-api-key-12345
  base_url: null
  temperature: 0.3
  max_tokens: 4096
  timeout: 60

execution:
  step_timeout: 120
  task_timeout: 1800
  max_total_steps: 100
  max_retries_per_step: 2
  max_subtask_steps: 3
  max_remedy_rounds: 2

database:
  path: ./test_data/test.db

project_root: .
tools_allowed: file,shell,search,code
shell_safe_mode: true